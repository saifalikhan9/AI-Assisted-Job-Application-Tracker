version: "3.9"

services:
  postgres:
    image: postgres:latest
    container_name: job_tracker_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: saif
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: job_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/job_tracker_db_Volume

volumes:
  postgres_data: